spring.application.name=EcommerceProjectMySQL

# Server Configuration
server.port=8080

# Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db
spring.datasource.username=ecommerce_user
spring.datasource.password=Siddarth@28
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration (HikariCP)
# These settings affect database connection handling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=update

# Show SQL: Print SQL queries to console (development only)
spring.jpa.show-sql=false

# Format SQL: Pretty-print SQL in logs
spring.jpa.properties.hibernate.format_sql=true

# Use SQL Comments: Add comments to generated SQL
spring.jpa.properties.hibernate.use_sql_comments=true

# Log SQL and bind parameters
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.example=DEBUG